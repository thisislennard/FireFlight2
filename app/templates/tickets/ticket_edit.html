{% extends "base.html" %}
{% block title %}Neues Ticket – FireFlight2{% endblock %}
{% block page_title %}Neues Ticket{% endblock %}
{% block content %}
{% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}
<form method="post" class="card elev-sm" style="max-width:560px;">
  <div class="field"><label>Titel</label><input class="input" type="text" name="title" required></div>
  <div class="field"><label>Drohne</label><input class="input" type="text" name="drone_label" placeholder="z. B. M30T FF Kelkheim"></div>
  <div class="field"><label>Beschreibung</label><textarea class="input" name="description"></textarea></div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Ticket erstellen</button>
    <a class="btn btn-secondary" href="{{ url_for('tickets.list_tickets') }}">Abbrechen</a>
  </div>
</form>
{% endblock %}
