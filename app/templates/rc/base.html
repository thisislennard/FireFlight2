<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="theme-color" content="#ec3013">
  <link rel="manifest" href="{{ url_for('static', filename='manifest-rc.webmanifest') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <title>{% block title %}FireFlight2 RC{% endblock %}</title>
</head>
<body class="auth-shell">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-list" style="position:fixed; top:var(--space-3); left:50%; transform:translateX(-50%); z-index:10; width:min(420px, 90vw);">
      {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
  <script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
</body>
</html>
